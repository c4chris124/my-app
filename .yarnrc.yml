# ★ ADVANCED CONCEPT: Yarn Node-Linker
# Controls HOW Yarn installs packages. Two modes:
#
# "pnp" (Berry default): Plug'n'Play — no node_modules, packages are zipped.
#   Faster installs, strict dependency enforcement, but INCOMPATIBLE with
#   tools that hardcode node_modules paths (some Vite plugins, NestJS internals).
#
# "node-modules": Classic node_modules behavior. Required for maximum
#   compatibility with the NestJS + Vite ecosystem

# * Also note that yarnPath must be set to the Berry version of Yarn for this to work, as the classic meaning 
# * Command "yarn set version berry" must be run in the project root to switch to the Berry version of Yarn.
nodeLinker: node-modules
